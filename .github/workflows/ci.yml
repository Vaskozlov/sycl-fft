name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ACPP_VERSION: "25.10.0"
  DPCPP_VERSION: "6.3.0"

jobs:
  quality:
    continue-on-error: true
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install quality tools
        run: |
          python -m pip install "clang-format==20.1.8"
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy clang-tools cmake libfftw3-dev ninja-build
      - name: Check formatting
        run: |
          clang-format --version
          find examples include src test_package tests \
            -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) \
            ! -path '*/build/*' \
            -exec clang-format --dry-run --Werror {} +
      - name: Configure clang-tidy
        run: >-
          cmake -S . -B build/tidy -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_CXX_FLAGS=-Werror=c++20-extensions
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DSYCLFFT_BUILD_HOST=ON
          -DSYCLFFT_BUILD_SYCL=OFF
          -DSYCLFFT_USE_SYSTEM_FFTW=ON
          -DSYCLFFT_BUILD_TESTS=ON
          -DSYCLFFT_BUILD_EXAMPLES=ON
      - name: Run clang-tidy
        run: run-clang-tidy -p build/tidy -quiet -warnings-as-errors='*'

  macos-host:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - run: brew install cmake ninja fftw
      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_FLAGS=-Werror=c++20-extensions
          -DSYCLFFT_BUILD_SYCL=OFF
          -DSYCLFFT_USE_SYSTEM_FFTW=ON
          -DSYCLFFT_BUILD_TESTS=ON
      - run: cmake --build build
      - run: ctest --test-dir build --output-on-failure
      - run: cmake --install build --prefix "$PWD/install"
      - name: Test installed host target
        run: >-
          cmake -S test_package -B consumer -G Ninja
          -DCMAKE_CXX_FLAGS=-Werror=c++20-extensions
          -Dsyclfft_DIR="$PWD/install/lib/cmake/syclfft"
          -DSYCLFFT_TEST_HOST=ON
          -DSYCLFFT_TEST_SYCL=OFF
      - run: cmake --build consumer
      - run: ./consumer/test_host

  macos-adaptivecpp-cpu:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - run: brew install adaptivecpp cmake llvm ninja
      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_FLAGS=-Werror=c++20-extensions
          -DCMAKE_C_COMPILER="$(brew --prefix llvm)/bin/clang"
          -DCMAKE_CXX_COMPILER="$(brew --prefix llvm)/bin/clang++"
          -DAdaptiveCpp_DIR="$(brew --prefix adaptivecpp)/lib/cmake/AdaptiveCpp"
          -DACPP_TARGETS=omp
          -DSYCLFFT_BUILD_HOST=OFF
          -DSYCLFFT_BUILD_SYCL=ON
          -DSYCLFFT_SYCL_IMPLEMENTATION=AdaptiveCpp
          -DSYCLFFT_CUFFT=OFF
          -DSYCLFFT_BUILD_TESTS=ON
      - run: cmake --build build
      - run: ./build/tests/syclfft_sycl_tests

  linux-adaptivecpp-cpu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install build dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          clang cmake ninja-build git libomp-dev python3
          libboost-context-dev libboost-fiber-dev libboost-test-dev
      - uses: actions/cache@v5
        id: cache-acpp
        with:
          path: ~/adaptivecpp
          key: adaptivecpp-${{ runner.os }}-${{ env.ACPP_VERSION }}-clang-omp-v2
      - name: Build AdaptiveCpp
        if: steps.cache-acpp.outputs.cache-hit != 'true'
        run: |
          git clone --branch "v${ACPP_VERSION}" --depth 1 \
            https://github.com/AdaptiveCpp/AdaptiveCpp.git "$RUNNER_TEMP/AdaptiveCpp"
          cmake -S "$RUNNER_TEMP/AdaptiveCpp" -B "$RUNNER_TEMP/acpp-build" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_INSTALL_PREFIX="$HOME/adaptivecpp" \
            -DACPP_COMPILER_FEATURE_PROFILE=none
          cmake --build "$RUNNER_TEMP/acpp-build" --parallel 2
          cmake --install "$RUNNER_TEMP/acpp-build"
      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_FLAGS=-Werror=c++20-extensions
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DAdaptiveCpp_DIR="$HOME/adaptivecpp/lib/cmake/AdaptiveCpp"
          -DACPP_TARGETS=omp
          -DSYCLFFT_BUILD_HOST=OFF
          -DSYCLFFT_BUILD_SYCL=ON
          -DSYCLFFT_SYCL_IMPLEMENTATION=AdaptiveCpp
          -DSYCLFFT_CUFFT=OFF
          -DSYCLFFT_BUILD_TESTS=ON
      - run: cmake --build build
      - run: ./build/tests/syclfft_sycl_tests
      - run: cmake --install build --prefix "$PWD/install"
      - name: Test installed SYCL target
        run: >-
          cmake -S test_package -B consumer -G Ninja
          -DCMAKE_CXX_FLAGS=-Werror=c++20-extensions
          -Dsyclfft_DIR="$PWD/install/lib/cmake/syclfft"
          -DAdaptiveCpp_DIR="$HOME/adaptivecpp/lib/cmake/AdaptiveCpp"
          -DSYCLFFT_TEST_HOST=OFF
          -DSYCLFFT_TEST_SYCL=ON
          -DSYCLFFT_TEST_IMPLEMENTATION=AdaptiveCpp
      - run: cmake --build consumer
      - run: ./consumer/test_sycl

  linux-dpcpp-opencl:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        opencl_runtime: [pocl, intel]
    steps:
      - uses: actions/checkout@v7
      - name: Install build dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          ca-certificates clinfo cmake curl gnupg ninja-build
          ocl-icd-libopencl1 libtbb12 libhwloc15 libzstd1
      - name: Install PoCL CPU runtime
        if: matrix.opencl_runtime == 'pocl'
        run: sudo apt-get install -y pocl-opencl-icd
      - name: Install Intel CPU OpenCL runtime
        if: matrix.opencl_runtime == 'intel'
        run: |
          curl --fail --location --retry 3 \
            https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            --output "$RUNNER_TEMP/oneapi.asc"
          gpg --dearmor --yes \
            --output "$RUNNER_TEMP/oneapi-archive-keyring.gpg" \
            "$RUNNER_TEMP/oneapi.asc"
          sudo install -m 0644 "$RUNNER_TEMP/oneapi-archive-keyring.gpg" \
            /usr/share/keyrings/oneapi-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-runtime-opencl
      - uses: actions/cache@v5
        id: cache-dpcpp
        with:
          path: ~/dpcpp
          key: dpcpp-${{ runner.os }}-${{ env.DPCPP_VERSION }}
      - name: Install open-source DPC++
        if: steps.cache-dpcpp.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/dpcpp"
          curl --fail --location --retry 3 \
            "https://github.com/intel/llvm/releases/download/v${DPCPP_VERSION}/sycl_linux.tar.gz" \
            --output "$RUNNER_TEMP/sycl_linux.tar.gz"
          tar -xzf "$RUNNER_TEMP/sycl_linux.tar.gz" -C "$HOME/dpcpp"
      - name: Export DPC++ environment
        run: |
          echo "$HOME/dpcpp/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=$HOME/dpcpp/lib:$HOME/dpcpp/lib/x86_64-unknown-linux-gnu" >> "$GITHUB_ENV"
      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_FLAGS=-Werror=c++20-extensions
          -DCMAKE_C_COMPILER="$HOME/dpcpp/bin/clang"
          -DCMAKE_CXX_COMPILER="$HOME/dpcpp/bin/clang++"
          -DSYCLFFT_BUILD_HOST=OFF
          -DSYCLFFT_BUILD_SYCL=ON
          -DSYCLFFT_SYCL_IMPLEMENTATION=DPCPP
          -DSYCLFFT_CUFFT=OFF
          -DSYCLFFT_BUILD_TESTS=ON
      - run: cmake --build build
      - run: clinfo -l
      - run: sycl-ls
      - name: Verify graceful rejection without USM
        if: matrix.opencl_runtime == 'pocl'
        env:
          ONEAPI_DEVICE_SELECTOR: opencl:cpu
        run: >-
          ./build/tests/syclfft_sycl_tests
          --expect-portable-unavailable
      - name: Run on Intel OpenCL CPU device
        if: matrix.opencl_runtime == 'intel'
        env:
          ONEAPI_DEVICE_SELECTOR: opencl:cpu
        run: ./build/tests/syclfft_sycl_tests

  windows-host:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Conan
        run: python -m pip install "conan>=2.20,<3"
      - name: Build and test host library
        timeout-minutes: 30
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          conan profile detect --force
          conan install . -of build/conan ^
            -s build_type=Release ^
            -s compiler.cppstd=17 ^
            -o "&:with_host=True" ^
            -o "&:with_sycl=False" ^
            -c tools.cmake.cmaketoolchain:generator=Ninja ^
            --build=missing
          cmake -S . -B build/windows-host -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=%CD%\build\conan\build\Release\generators\conan_toolchain.cmake ^
            -DSYCLFFT_BUILD_HOST=ON ^
            -DSYCLFFT_BUILD_SYCL=OFF ^
            -DSYCLFFT_BUILD_TESTS=ON
          cmake --build build/windows-host
          set "PATH=%CD%\build\windows-host;%PATH%"
          ctest --test-dir build/windows-host --output-on-failure --timeout 120
      - name: Build installed host consumer
        timeout-minutes: 10
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --install build/windows-host --prefix "%CD%\install"
          cmake -S test_package -B consumer -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -Dsyclfft_DIR=%CD%\install\lib\cmake\syclfft ^
            -DSYCLFFT_TEST_HOST=ON ^
            -DSYCLFFT_TEST_SYCL=OFF
          cmake --build consumer
      - name: Run installed host consumer
        timeout-minutes: 3
        shell: pwsh
        run: |
          $env:PATH = "$pwd\install\bin;$env:PATH"
          $env:SYCLFFT_PLUGIN_PATH = "$pwd\install\bin\syclfft\providers"
          $env:SYCLFFT_TRACE = "1"
          Write-Host "Starting installed host consumer"
          $process = Start-Process `
            -FilePath "$pwd\consumer\test_host.exe" `
            -NoNewWindow -PassThru
          if (-not $process.WaitForExit(120000)) {
            Stop-Process -Id $process.Id -Force
            throw "Installed host consumer timed out after 120 seconds"
          }
          if ($process.ExitCode -ne 0) {
            throw "Installed host consumer failed with exit code $($process.ExitCode)"
          }
          Write-Host "Installed host consumer passed"

  windows-dpcpp-build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v5
        id: cache-dpcpp
        with:
          path: ~/dpcpp
          key: dpcpp-${{ runner.os }}-${{ env.DPCPP_VERSION }}
      - name: Install open-source DPC++
        if: steps.cache-dpcpp.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "$HOME/dpcpp" | Out-Null
          curl.exe --fail --location --retry 3 `
            "https://github.com/intel/llvm/releases/download/v${env:DPCPP_VERSION}/sycl_windows.tar.gz" `
            --output "$env:RUNNER_TEMP/sycl_windows.tar.gz"
          tar -xzf "$env:RUNNER_TEMP/sycl_windows.tar.gz" -C "$HOME/dpcpp"
      - name: Compile and link SYCL targets
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set "DPCPP_ROOT=%USERPROFILE%\dpcpp\sycl_windows"
          set "PATH=%DPCPP_ROOT%\bin;%PATH%"
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=%DPCPP_ROOT%\bin\clang.exe ^
            -DCMAKE_CXX_COMPILER=%DPCPP_ROOT%\bin\clang++.exe ^
            -DSYCLFFT_BUILD_HOST=OFF ^
            -DSYCLFFT_BUILD_SYCL=ON ^
            -DSYCLFFT_SYCL_IMPLEMENTATION=DPCPP ^
            -DSYCLFFT_CUFFT=OFF ^
            -DSYCLFFT_BUILD_TESTS=ON
          cmake --build build

  windows-adaptivecpp-cpu:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - name: Install AdaptiveCpp LLVM binary
        shell: pwsh
        run: |
          $archive = "$env:RUNNER_TEMP/AdaptiveCpp-LLVM20-Win.zip"
          $install = "$env:USERPROFILE/adaptivecpp"
          Invoke-WebRequest `
            "https://nightly.link/AdaptiveCpp/AdaptiveCpp/workflows/windows-acppllvm/develop/AdaptiveCpp-LLVM20-Win.zip" `
            -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $install
          "$install/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "ACPP_ROOT=$install" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Configure, build, and test
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set "PATH=%CD%\build;%ACPP_ROOT%\bin;%PATH%"
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=%ACPP_ROOT%\bin\clang.exe ^
            -DCMAKE_CXX_COMPILER=%ACPP_ROOT%\bin\clang.exe ^
            -DAdaptiveCpp_DIR=%ACPP_ROOT%\lib\cmake\AdaptiveCpp ^
            -DACPP_TARGETS=omp ^
            -DSYCLFFT_BUILD_HOST=OFF ^
            -DSYCLFFT_BUILD_SYCL=ON ^
            -DSYCLFFT_SYCL_IMPLEMENTATION=AdaptiveCpp ^
            -DSYCLFFT_CUFFT=OFF ^
            -DSYCLFFT_BUILD_TESTS=ON
          cmake --build build
          acpp-info
          build\tests\syclfft_sycl_tests.exe

  cuda-plugin-build:
    runs-on: ubuntu-22.04
    container: nvidia/cuda:12.6.3-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install build dependencies
        run: >-
          apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y
          ca-certificates cmake curl ninja-build libtbb12 libhwloc15 libzstd1
      - name: Install open-source DPC++
        run: |
          mkdir -p /opt/dpcpp
          curl --fail --location --retry 3 \
            "https://github.com/intel/llvm/releases/download/v${DPCPP_VERSION}/sycl_linux.tar.gz" \
            --output /tmp/sycl_linux.tar.gz
          tar -xzf /tmp/sycl_linux.tar.gz -C /opt/dpcpp
      - name: Configure cuFFT plugin
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_FLAGS=-Werror=c++20-extensions
          -DCMAKE_C_COMPILER=/opt/dpcpp/bin/clang
          -DCMAKE_CXX_COMPILER=/opt/dpcpp/bin/clang++
          -DSYCLFFT_BUILD_HOST=OFF
          -DSYCLFFT_BUILD_SYCL=ON
          -DSYCLFFT_SYCL_IMPLEMENTATION=DPCPP
          -DSYCLFFT_CUFFT=ON
          -DSYCLFFT_BUILD_TESTS=OFF
      - run: cmake --build build
